name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Permissions required for AWS OIDC authentication
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Deploy static assets to S3
        run: |
          # Sync all files except index.html with a long cache lifetime (immutable hashed assets)
          aws s3 sync dist/ s3://${{ vars.AWS_S3_BUCKET }} --exclude "index.html" --delete --cache-control "public, max-age=31536000, immutable"
          
          # Sync index.html with no-cache so users always receive the latest entry point
          aws s3 sync dist/ s3://${{ vars.AWS_S3_BUCKET }} --exclude "*" --include "index.html" --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
