    <!--
      Fonts load here rather than via @import in index.css. A CSS @import is
      render-blocking and serially discovered: the browser had to fetch and parse
      the stylesheet before it even learned the font URLs. preconnect opens the
      gstatic connection in parallel.
      Poppins 400/500 are omitted - headings never render below semibold.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"
    />
